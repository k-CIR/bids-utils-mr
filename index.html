<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIDS Utils MR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 2rem;
      margin: 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #3c3c3c;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      color: #888;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.45rem 1.1rem;
      margin-bottom: -1px;
      border-radius: 3px 3px 0 0;
    }
    .tab-btn:hover:not(.active) { color: #ccc; }
    .tab-btn.active {
      color: #d4d4d4;
      background: #252526;
      border-color: #3c3c3c;
      border-bottom-color: #252526;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Path row ── */
    .path-row {
      display: flex;
      align-items: center;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 3px;
      padding: 0.35rem 0.7rem;
      margin-bottom: 0.9rem;
    }
    .path-static {
      color: #555;
      white-space: nowrap;
      user-select: none;
      flex-shrink: 0;
    }
    .path-input {
      background: transparent;
      border: none;
      outline: none;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 0.95rem;
      flex: 1;
      min-width: 0;
    }

    /* ── Text / warnings ── */
    .description {
      color: #9e9e9e;
      font-size: 0.88rem;
      line-height: 1.6;
      margin: 0 0 1rem;
    }
    .warn {
      color: #f48771;
      font-size: 0.88rem;
      margin-bottom: 0.8rem;
    }

    /* ── Button ── */
    .btn {
      background: #0e639c;
      color: #fff;
      border: none;
      padding: 0.45rem 1.1rem;
      font-size: 0.95rem;
      font-family: monospace;
      cursor: pointer;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn:hover { background: #1177bb; }
    .btn:disabled { background: #555; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Terminal output ── */
    #helper-output {
      margin-top: 1.2rem;
      background: #0d0d0d;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 0.8rem 1rem;
      white-space: pre-wrap;
      min-height: 5rem;
      max-height: 440px;
      overflow-y: auto;
      line-height: 1.55;
      font-size: 0.87rem;
      color: #c8c8c8;
    }
    .t-ok  { color: #4ec9b0; }
    .t-err { color: #f48771; }

    /* ── Force checkbox ── */
    .force-label {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #9e9e9e;
      line-height: 1.5;
      margin-bottom: 0.8rem;
      cursor: pointer;
    }
    .force-label input[type="checkbox"] {
      margin-top: 0.15rem;
      flex-shrink: 0;
      accent-color: #0e639c;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button class="tab-btn active" data-target="config" onclick="switchTab('config')">Config helper</button>
    <button class="tab-btn"        data-target="bids"   onclick="switchTab('bids')">Make BIDS</button>
  </div>

  <!-- ── Config helper ── -->
  <div id="tab-config" class="tab-pane active">
    <p class="description">
      Select one representative session from which to extract DICOM fields that can be
      used to organize your data. The first session in your data is selected by default.
    </p>

    <div id="path-warn" class="warn" style="display:none;"></div>

    <div class="path-row">
      <span class="path-static" id="path-static">/data/projects/…</span>
      <span class="path-static">/</span>
      <input id="helper-path" class="path-input" type="text"
             spellcheck="false" placeholder="raw/mri/…" />
    </div>

    <label class="force-label">
      <input type="checkbox" id="force-check" />
      Force dcm2bids helper &ndash; overwrite previous results from analyzing DICOM fields with the specified session
    </label>

    <button class="btn" id="analyze-btn" onclick="runHelper()">Analyze DICOM fields</button>

    <div id="helper-output">Output will appear here…</div>
  </div>

  <!-- ── Make BIDS ── -->
  <div id="tab-bids" class="tab-pane">
    <p class="description">Make BIDS functionality coming soon.</p>
  </div>

  <script>
    /* ── Tab switching ── */
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.target === name)
      );
      document.querySelectorAll('.tab-pane').forEach(p =>
        p.classList.remove('active')
      );
      document.getElementById('tab-' + name).classList.add('active');
    }

    /* ── On load: fetch config from server ── */
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const cfg = await fetch('/get-config').then(r => r.json());
        document.getElementById('path-static').textContent = cfg.project_root;
        if (cfg.warning) {
          const w = document.getElementById('path-warn');
          w.textContent = '⚠ ' + cfg.warning;
          w.style.display = '';
        }
        if (cfg.default_path) {
          document.getElementById('helper-path').value = cfg.default_path;
        }
      } catch (_) { /* ignore */ }
    });

    /* ── Stream dcm2bids_helper output via SSE ── */
    let activeSource = null;

    function runHelper() {
      const btn = document.getElementById('analyze-btn');
      const out = document.getElementById('helper-output');
      const relPath = document.getElementById('helper-path').value.trim();

      if (!relPath) {
        out.innerHTML = '<span class="t-err">Please enter a path.</span>';
        return;
      }

      if (activeSource) { activeSource.close(); activeSource = null; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Analyzing\u2026';
      out.innerHTML = '';

      const force = document.getElementById('force-check').checked ? '1' : '0';
      activeSource = new EventSource(
        '/run-dcm2bids-helper?path=' + encodeURIComponent(relPath) + '&force=' + force
      );

      activeSource.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.error === 'invalid_path') {
          activeSource.close();
          activeSource = null;
          btn.disabled = false;
          btn.textContent = 'Analyze DICOM fields';
          out.innerHTML = '<span class="t-err">Invalid path.</span>';
          return;
        }
        if (msg.done) {
          activeSource.close();
          activeSource = null;
          btn.disabled = false;
          btn.textContent = 'Analyze DICOM fields';
          const ok = msg.returncode === 0;
          out.innerHTML +=
            '<span class="' + (ok ? 't-ok' : 't-err') + '">' +
            esc(ok ? '\n\u2713 Done.' : '\n\u2717 Exited with code ' + msg.returncode + '.') +
            '</span>';
          out.scrollTop = out.scrollHeight;
        } else {
          out.innerHTML += esc(msg.line) + '\n';
          out.scrollTop = out.scrollHeight;
        }
      };

      activeSource.onerror = () => {
        activeSource.close();
        activeSource = null;
        btn.disabled = false;
        btn.textContent = 'Analyze DICOM fields';
        out.innerHTML += '<span class="t-err">\nConnection error.</span>'; // unexpected network drop
      };
    }

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
