<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIR BIDS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 2rem;
      margin: 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #3c3c3c;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      color: #888;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.45rem 1.1rem;
      margin-bottom: -1px;
      border-radius: 3px 3px 0 0;
    }
    .tab-btn:hover:not(.active) { color: #ccc; }
    .tab-btn.active {
      color: #d4d4d4;
      background: #252526;
      border-color: #3c3c3c;
      border-bottom-color: #252526;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Path row ── */
    .path-row {
      display: flex;
      align-items: center;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 3px;
      padding: 0.35rem 0.7rem;
      margin-bottom: 0.9rem;
    }
    .path-static {
      color: #555;
      white-space: nowrap;
      user-select: none;
      flex-shrink: 0;
    }
    .path-input {
      background: transparent;
      border: none;
      outline: none;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 0.95rem;
      flex: 1;
      min-width: 0;
    }

    /* ── Text / warnings ── */
    .description {
      color: #9e9e9e;
      font-size: 0.88rem;
      line-height: 1.6;
      margin: 0 0 1rem;
    }
    .warn {
      color: #f48771;
      font-size: 0.88rem;
      margin-bottom: 0.8rem;
    }

    /* ── Button ── */
    .btn {
      background: #0e639c;
      color: #fff;
      border: none;
      padding: 0.45rem 1.1rem;
      font-size: 0.95rem;
      font-family: monospace;
      cursor: pointer;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn:hover { background: #1177bb; }
    .btn:disabled { background: #555; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Terminal output ── */
    #helper-output {
      margin-top: 1.2rem;
      background: #0d0d0d;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 0.8rem 1rem;
      white-space: pre-wrap;
      min-height: 5rem;
      max-height: 440px;
      overflow-y: auto;
      line-height: 1.55;
      font-size: 0.87rem;
      color: #c8c8c8;
    }
    .t-ok  { color: #4ec9b0; }
    .t-err { color: #f48771; }

    /* ── Force checkbox ── */
    .force-label {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #9e9e9e;
      line-height: 1.5;
      margin-bottom: 0.8rem;
      cursor: pointer;
    }
    .force-label input[type="checkbox"] {
      margin-top: 0.15rem;
      flex-shrink: 0;
      accent-color: #0e639c;
    }

    /* ── Config builder table ── */
    .config-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.88rem;
      white-space: nowrap;
    }
    .config-table th, .config-table td {
      border: 1px solid #3c3c3c;
      padding: 0.35rem 0.65rem;
      text-align: left;
    }
    .config-table thead tr:first-child th {
      background: #252526;
      text-align: center;
      color: #aaa;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .config-table thead tr:last-child th {
      background: #2a2a2a;
      color: #9e9e9e;
      font-size: 0.84rem;
    }
    .col-output { border-left: 2px solid #555 !important; }
    .input-cell  { cursor: pointer; user-select: none; }
    .input-cell:hover { background: #2a3a2a; }
    .cell-selected { background: #1a3a1a; color: #4ec9b0; }
    .tbl-select, .tbl-input {
      background: #1e1e1e;
      border: 1px solid #444;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 0.87rem;
      padding: 0.2rem 0.4rem;
      border-radius: 2px;
      width: 100%;
      min-width: 5.5rem;
    }
    .tbl-select:focus, .tbl-input:focus { outline: none; border-color: #0e639c; }
    .tbl-input::placeholder { color: #444; }

    /* ── Config editor ── */
    .editor-wrap {
      display: flex;
      background: #0d0d0d;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      overflow: hidden;
      min-height: 45rem;
      resize: vertical;
    }
    .editor-lines {
      padding: 0.8rem 0.5rem;
      background: #141414;
      border-right: 1px solid #2a2a2a;
      color: #4a4a4a;
      font-family: monospace;
      font-size: 0.87rem;
      line-height: 1.55;
      text-align: right;
      user-select: none;
      min-width: 2.8rem;
      overflow: hidden;
      flex-shrink: 0;
      white-space: pre;
    }
    .config-editor-ta {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      color: #c8c8c8;
      font-family: monospace;
      font-size: 0.87rem;
      padding: 0.8rem 1rem;
      line-height: 1.55;
      resize: none;
      outline: none;
      overflow-y: auto;
    }
    .editor-wrap:focus-within { outline: 1px solid #0e639c; }
    .btn-secondary { background: #3c3c3c; }
    .btn-secondary:hover { background: #4a4a4a; }
    .recode-hint { font-size: 0.75rem; line-height: 1.3; min-height: 1rem; margin-top: 2px; }
  </style>
</head>
<body>

  <img src="https://k-cir.github.io/cir-wiki/assets/logo_white.svg"
       alt="CIR logo"
       style="display:block; height:3rem; margin-bottom:0.6rem;" />

  <p style="margin:0 0 1.2rem; font-size:0.88rem; color:#9e9e9e;">
    See the <a href="https://k-cir.github.io/cir-wiki/mrc/mrc-bids/" target="_blank"
       style="color:#4ec9b0;">CIR wiki-pages</a>
    for a detailed description on how to use this interface to order your MR data collected at CIR as BIDS.
  </p>

  <div class="tabs" id="tab-bar"></div>
  <div id="tab-container"></div>

  <script>
    /* ── Shared utilities ── */
    let authToken = null;

    function addTokenToUrl(url) {
      if (!authToken) return url;
      const sep = url.includes('?') ? '&' : '?';
      return url + sep + 'token=' + encodeURIComponent(authToken);
    }

    function _handleAuthError() {
      alert('Authentication failed. Please refresh and enter a valid token.');
      window.location.href = '/';
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return esc(s).replace(/"/g, '&quot;');
    }

    /* ── Tab switching ── */
    let _activeTabId = null;
    let _registeredTabModules = {};

    function switchTab(id) {
      _activeTabId = id;
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.target === id)
      );
      document.querySelectorAll('[id^="tabwrap-"]').forEach(w => {
        w.style.display = (w.id === 'tabwrap-' + id) ? '' : 'none';
      });
      // Notify active tab module
      const mod = _registeredTabModules[id];
      if (mod && mod.onTabSwitch) mod.onTabSwitch(id);
    }

    /* ── Bootstrap ── */
    window.addEventListener('DOMContentLoaded', async () => {
      authToken = new URLSearchParams(window.location.search).get('token');

      const tabBar   = document.getElementById('tab-bar');
      const container = document.getElementById('tab-container');

      let tabs;
      try {
        const res = await fetch(addTokenToUrl('/api/tabs'));
        if (res.status === 401) { _handleAuthError(); return; }
        tabs = await res.json();
      } catch (e) {
        container.innerHTML =
          '<p class="warn">⚠ Failed to connect to server.</p>';
        return;
      }

      if (!tabs.length) {
        tabBar.innerHTML = '';
        container.innerHTML =
          '<p class="warn">⚠ No BIDS tabs are available for this project. ' +
          'Create <code>raw/mri</code> to show MR BIDS and <code>raw/bmic</code> to show PET BIDS.</p>';
        return;
      }

      for (const [i, tab] of tabs.entries()) {
        // Tab button
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.dataset.target = tab.id;
        btn.textContent = tab.label;
        btn.onclick = () => switchTab(tab.id);
        tabBar.appendChild(btn);

        // Load + inject tab fragment
        let html = '';
        try {
          const r = await fetch(addTokenToUrl('/tab-content?id=' + encodeURIComponent(tab.id)));
          if (r.ok) html = await r.text();
        } catch (_) {}

        const wrap = document.createElement('div');
        wrap.id = 'tabwrap-' + tab.id;
        wrap.style.display = (i === 0) ? '' : 'none';
        wrap.innerHTML = html;
        container.appendChild(wrap);

        // Execute inline scripts from the injected fragment
        wrap.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          if (old.src) s.src = old.src;
          else s.textContent = old.textContent;
          document.head.appendChild(s);
        });

        // Call tab's init function
        const initFn = window['tabInit_' + tab.id.replace(/-/g, '_')];
        if (initFn) initFn(authToken);

        // Register tab module for onTabSwitch callbacks
        const modName = window[tab.id.replace(/-/g, '_') + 'Tab'] ||
                        window[tab.id.replace(/-/g, '')]    ||
                        null;
        // mr-bids registers itself as window.mrBids
        const guessedNames = [
          'mrBids',
          tab.id,
          tab.id.replace(/-/g, '_'),
        ];
        for (const n of guessedNames) {
          if (window[n] && typeof window[n].onTabSwitch === 'function') {
            _registeredTabModules[tab.id] = window[n];
            break;
          }
        }
      }

      if (tabs.length > 0) {
        _activeTabId = tabs[0].id;
      }
    });
  </script>
</body>
</html>
